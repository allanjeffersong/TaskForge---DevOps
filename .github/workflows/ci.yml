name: CI — TaskForge

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Build, Test e SonarCloud
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: taskforge_test
          POSTGRES_USER: taskforge
          POSTGRES_PASSWORD: taskforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar o projeto
        working-directory: backend
        run: ./mvnw compile -B

      - name: Rodar testes e gerar relatório JaCoCo
        working-directory: backend
        run: ./mvnw test -B
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Análise do SonarCloud
        working-directory: backend
        run: ./mvnw sonar:sonar -B
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
          -Dsonar.java.coveragePlugin=jacoco
          -Dsonar.exclusions=**/BackendApplication.java
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  frontend:
    name: Build do Front-end
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build do React
        working-directory: frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:8080/api